name: Workload Identity Federation Example

on:
  workflow_dispatch
  
jobs:
  job_id:
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: 'actions/checkout@v3'

      # Authenticate to Google Cloud using Workload Identity Federation
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v1'
        with:
            token_format: 'access_token'
            workload_identity_provider: 'projects/177707171764/locations/global/workloadIdentityPools/testgithubactions/subject/SUBJECT_ATTRIBUTE_VALUE'
            service_account: 'github-actions@gcplearning-15042026.iam.gserviceaccount.com'

      # Install and configure gcloud SDK, set-up, automatically picks-up authentication from 'auth'
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v1'

      # Run gcloud command
      - id: 'gcloud'
        name: 'gcloud'
        run: |-
          gcloud secrets versions access "latest" --secret="my-secret"